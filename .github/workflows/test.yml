name: FlickFix Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
        - name: Checkout code
        uses: actions/checkout@v4.2.2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Run test suite
        shell: pwsh
        run: |
          $result = & ".\Tests\Run-Tests.ps1"
          exit $LASTEXITCODE